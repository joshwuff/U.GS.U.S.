<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U.GS.U.C. - Utilization Goal Calculator</title>
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .calculator-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .logo {
            display: block;
            margin: 0 auto 30px;
            max-width: 250px;
            height: auto;
        }

        h1 {
            font-size: 24px;
            font-weight: bold;
            color: #000000;
            margin-bottom: 30px;
        }

        .input-group {
            width: 80%;
            margin: 0 auto 20px;
            text-align: left;
        }

        .input-label {
            display: block;
            font-size: 14px;
            color: #666666;
            margin-bottom: 5px;
        }

        input[type="number"], select {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            box-sizing: border-box; 
        }

        .formula-text {
            font-size: 14px;
            color: #333333;
            margin-bottom: 20px;
        }

        /* Fake reCAPTCHA Styling */
        .fake-recaptcha {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fafafa;
            border: 1px solid #d3d3d3;
            border-radius: 3px;
            padding: 10px 15px;
            margin: 0 auto 20px auto;
            width: 80%;
            box-sizing: border-box;
        }

        .fake-recaptcha-left {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .fake-recaptcha-left input[type="checkbox"] {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            cursor: pointer;
        }

        .fake-recaptcha-left span {
            font-size: 14px;
            color: #555555;
        }

        .fake-recaptcha-right {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .fake-recaptcha-right .icon {
            font-size: 20px;
            color: #4a90e2;
            margin-bottom: 2px;
        }

        .fake-recaptcha-right .text {
            font-size: 10px;
            color: #999999;
        }

        button {
            background-color: #f57c00; 
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
            width: 80%;
            margin-bottom: 10px;
        }

        button:hover {
            background-color: #e66a00;
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        .result-section {
            margin-top: 20px;
        }

        .result-output {
            font-size: 18px;
            color: #666666;
            font-style: italic;
        }

        /* Dashboard Styling */
        .dashboard {
            width: 100%;
            max-width: 600px;
            background-color: #ffffff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }

        .dashboard-header {
            display: flex;
            flex-direction: column;
            border-bottom: 2px solid #f57c00;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .dashboard-header h2 {
            font-size: 20px;
            margin: 0;
        }
        
        .week-label {
            font-size: 14px;
            color: #666666;
            margin-top: 5px;
        }

        .agent-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .agent-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eeeeee;
            font-size: 16px;
        }

        .agent-item:last-child {
            border-bottom: none;
        }

        .agent-name {
            font-weight: bold;
        }

        .agent-stats {
            color: #555555;
        }

        .footer-note {
            margin-top: 20px;
            font-size: 12px;
            color: #888888;
            text-align: center;
        }

        .reset-btn {
            background: none;
            border: none;
            color: #d32f2f;
            text-decoration: underline;
            cursor: pointer;
            font-size: 12px;
            margin-top: 15px;
            padding: 5px;
        }
        
        .reset-btn:hover {
            color: #b71c1c;
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        <img src="U.GS.U.C-logo.png" alt="Unofficial Geek Squad U.GS.U.C. Logo" class="logo">

        <h1>U.GS.U.C. - Utilization Goal</h1>

        <div class="input-group">
            <label for="agentSelect" class="input-label">Select Agent</label>
            <select id="agentSelect" autocomplete="off">
                <option value="" disabled selected>-- Choose Agent --</option>
                <option value="Alvan">Alvan</option>
                <option value="Alejandro">Alejandro</option>
                <option value="Justin">Justin</option>
                <option value="Josh">Josh</option>
                <option value="James">James</option>
                <option value="Marrion">Marrion</option>
                <option value="Rob">Rob</option>
                <option value="Diana">Diana</option>
                <option value="Kurt">Kurt</option>
                <option value="G">G</option>
                <option value="Arturo">Arturo</option>
            </select>
        </div>

        <div class="input-group">
            <label for="hoursWorked" class="input-label">Hours Worked</label>
            <input type="number" id="hoursWorked" placeholder="e.g., 8" autocomplete="off">
        </div>

        <p class="formula-text">Goal = (hours x 60) x 0.81</p>

        <div class="fake-recaptcha">
            <label class="fake-recaptcha-left" for="robotCheck">
                <input type="checkbox" id="robotCheck" autocomplete="off">
                <span>I'm not a robot</span>
            </label>
            <div class="fake-recaptcha-right">
                <div class="icon">↻</div>
                <div class="text">reCAPTCHA</div>
            </div>
        </div>

        <button id="calculateBtn">Calculate & Log Target</button>

        <div class="result-section">
            <p id="resultOutput" class="result-output">Ready to sync...</p>
        </div>
    </div>

    <div class="dashboard">
        <div class="dashboard-header">
            <h2>Precinct Totals</h2>
            <span class="week-label" id="weekLabel">Loading week...</span>
        </div>
        <ul class="agent-list" id="agentList">
            <li class="agent-item" style="color:#999; justify-content:center;">Connecting to database...</li>
        </ul>
    </div>

    <button id="resetDataBtn" class="reset-btn">Reset Data for Current Week</button>

    <div class="footer-note">Target: 81% (0.81) | You can do it!!! | v1.0 (Cloud Sync)</div>

    <script>
        // Initialize Supabase with your specific Project URL and Publishable Key
        const _supabase = supabase.createClient(
            'https://yxeozqztofvpydxveyr.supabase.co',
            'sb_publishable_3WRcMc4zjv-N-9oZry-SbA_MmRRKv1b'
        );

        document.addEventListener('DOMContentLoaded', () => {
            const calculateBtn = document.getElementById('calculateBtn');
            const resetDataBtn = document.getElementById('resetDataBtn');
            const agentSelect = document.getElementById('agentSelect');
            const hoursInput = document.getElementById('hoursWorked');
            const robotCheck = document.getElementById('robotCheck');
            const resultOutput = document.getElementById('resultOutput');
            const agentListElement = document.getElementById('agentList');
            const weekLabel = document.getElementById('weekLabel');

            // --- DATE & WEEK LOGIC ---
            function getMondayOfCurrentWeek() {
                const today = new Date();
                const day = today.getDay();
                const diff = today.getDate() - day + (day === 0 ? -6 : 1);
                const monday = new Date(today.setDate(diff));
                const options = { month: 'long', day: 'numeric', year: 'numeric' };
                return monday.toLocaleDateString('en-US', options);
            }

            const currentWeekString = getMondayOfCurrentWeek();
            weekLabel.textContent = `Week of ${currentWeekString}`;

            // --- UI RESET ---
            hoursInput.value = '';
            agentSelect.selectedIndex = 0;
            robotCheck.checked = false;

            // --- FETCH DATA FROM SUPABASE ---
            async function fetchDashboardData() {
                // Pull all logs from the database that match the current week
                const { data, error } = await _supabase
                    .from('utilization_logs')
                    .select('*')
                    .eq('week_of', currentWeekString);

                if (error) {
                    console.error("Error fetching data:", error);
                    agentListElement.innerHTML = '<li class="agent-item" style="color:#d32f2f; justify-content:center;">Error loading database.</li>';
                    return;
                }

                // Add up the minutes for each agent
                const totals = {};
                data.forEach(log => {
                    if (!totals[log.agent_name]) {
                        totals[log.agent_name] = 0;
                    }
                    totals[log.agent_name] += log.target_minutes;
                });

                renderDashboard(totals);
            }

            // --- RENDER DASHBOARD ---
            function renderDashboard(totals) {
                agentListElement.innerHTML = ''; 
                const sortedAgents = Object.keys(totals).sort();

                if (sortedAgents.length === 0) {
                    agentListElement.innerHTML = '<li class="agent-item" style="color:#999; justify-content:center;">No data logged this week.</li>';
                    return;
                }

                sortedAgents.forEach(agent => {
                    const totalMinutes = totals[agent];
                    const displayHours = Math.floor(totalMinutes / 60);
                    const displayMinutes = totalMinutes % 60;

                    const li = document.createElement('li');
                    li.className = 'agent-item';
                    
                    li.innerHTML = `
                        <span class="agent-name">${agent}</span>
                        <span class="agent-stats">${totalMinutes} min (~${displayHours}h ${displayMinutes}m)</span>
                    `;
                    agentListElement.appendChild(li);
                });
            }

            // --- CALCULATE AND SEND TO SUPABASE ---
            async function calculateGoal() {
                const selectedAgent = agentSelect.value;
                const hoursVal = hoursInput.value;

                if (!selectedAgent) {
                    resultOutput.textContent = "Please select an agent first!";
                    resultOutput.style.color = "#d32f2f";
                    return;
                }

                if (!robotCheck.checked) {
                    resultOutput.textContent = "Security check: Please verify you are not a robot!";
                    resultOutput.style.color = "#d32f2f"; 
                    return;
                }

                if (hoursVal === "" || isNaN(hoursVal) || hoursVal < 0) {
                    resultOutput.textContent = "Please enter a valid number of hours.";
                    resultOutput.style.color = "#d32f2f";
                    return;
                }

                calculateBtn.disabled = true;
                calculateBtn.textContent = "Saving...";

                const hours = parseFloat(hoursVal);
                const targetMinutes = Math.round((hours * 60) * 0.81);

                // Insert the new log into the Supabase database
                const { error } = await _supabase
                    .from('utilization_logs')
                    .insert([
                        { 
                            agent_name: selectedAgent, 
                            target_minutes: targetMinutes, 
                            week_of: currentWeekString 
                        }
                    ]);

                calculateBtn.disabled = false;
                calculateBtn.textContent = "Calculate & Log Target";

                if (error) {
                    console.error("Error saving data:", error);
                    resultOutput.style.color = "#d32f2f"; 
                    resultOutput.textContent = "Failed to sync to cloud. Try again.";
                    return;
                }

                resultOutput.style.color = "#4CAF50"; 
                resultOutput.textContent = `Synced ${targetMinutes} target minutes for ${selectedAgent}.`;
                
                robotCheck.checked = false;
                hoursInput.value = '';

                // Refresh the dashboard with the newly saved data
                fetchDashboardData();
            }

            // --- MANUAL RESET (WIPES THE CLOUD FOR THIS WEEK) ---
            async function manualReset() {
                if(confirm("Are you sure you want to clear ALL cloud data for this week? This deletes everyone's logs and cannot be undone!")) {
                    resultOutput.textContent = "Deleting...";
                    
                    const { error } = await _supabase
                        .from('utilization_logs')
                        .delete()
                        .eq('week_of', currentWeekString);

                    if (error) {
                        console.error("Error deleting data:", error);
                        resultOutput.textContent = "Failed to delete data.";
                        resultOutput.style.color = "#d32f2f";
                        return;
                    }

                    resultOutput.textContent = "Cloud data cleared for the week.";
                    resultOutput.style.color = "#666666";
                    fetchDashboardData();
                }
            }

            // --- INITIALIZE ON LOAD ---
            calculateBtn.addEventListener('click', calculateGoal);
            resetDataBtn.addEventListener('click', manualReset);
            hoursInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') calculateGoal();
            });

            // Fetch the live data as soon as the page loads!
            fetchDashboardData();
        });
    </script>
</body>
</html>

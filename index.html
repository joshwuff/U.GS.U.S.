<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U.GS.U.C. - Utilization Goal Calculator</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .calculator-container {
            background-color: #ffffff;
            width: 90%;
            max-width: 600px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .logo {
            display: block;
            margin: 0 auto 30px;
            max-width: 250px;
            height: auto;
        }

        h1 {
            font-size: 24px;
            font-weight: bold;
            color: #000000;
            margin-bottom: 30px;
        }

        .input-group {
            width: 80%;
            margin: 0 auto 20px;
            text-align: left;
        }

        .input-label {
            display: block;
            font-size: 14px;
            color: #666666;
            margin-bottom: 5px;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            box-sizing: border-box; 
        }

        .formula-text {
            font-size: 14px;
            color: #333333;
            margin-bottom: 30px;
        }

        button {
            background-color: #f57c00; 
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #e66a00;
        }

        .result-section {
            margin-top: 30px;
        }

        .result-label {
            font-size: 16px;
            color: #333333;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .result-output {
            font-size: 18px;
            color: #666666;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        <img src="U.GS.U.C-logo.png" alt="Unofficial Geek Squad U.GS.U.C. Logo" class="logo">

        <h1>U.GS.U.C. - Utilization Goal Calculator</h1>

        <div class="input-group">
            <label for="hoursWorked" class="input-label">Hours Worked</label>
            <input type="number" id="hoursWorked" placeholder="e.g., 8">
        </div>

        <p class="formula-text">Goal = (hours x 60) x 0.81</p>

        <button id="calculateBtn">Calculate Goal</button>

        <div class="result-section">
            <p class="result-label">Result:</p>
            <p id="resultOutput" class="result-output">Goal for 8 hours: 389 minutes</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const calculateBtn = document.getElementById('calculateBtn');
            const hoursInput = document.getElementById('hoursWorked');
            const resultOutput = document.getElementById('resultOutput');

            function calculateGoal() {
                const hoursVal = hoursInput.value;

                if (hoursVal === "" || isNaN(hoursVal) || hoursVal < 0) {
                    resultOutput.textContent = "Please enter a valid number of hours.";
                    resultOutput.style.color = "red";
                    return;
                }

                const hours = parseFloat(hoursVal);
                const totalMinutes = (hours * 60) * 0.81;
                const roundedMinutes = Math.round(totalMinutes);

                resultOutput.style.color = "#666666"; 
                resultOutput.textContent = `Goal for ${hours} hours: ${roundedMinutes} minutes`;
            }

            calculateBtn.addEventListener('click', calculateGoal);

            hoursInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    calculateGoal();
                }
            });
        });
    </script>
</body>
</html>

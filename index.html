<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U.GS.U.C. - Utilization Goal Calculator</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .calculator-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .logo {
            display: block;
            margin: 0 auto 30px;
            max-width: 250px;
            height: auto;
        }

        h1 {
            font-size: 24px;
            font-weight: bold;
            color: #000000;
            margin-bottom: 30px;
        }

        .input-group {
            width: 80%;
            margin: 0 auto 20px;
            text-align: left;
        }

        .input-label {
            display: block;
            font-size: 14px;
            color: #666666;
            margin-bottom: 5px;
        }

        input[type="number"], select {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            box-sizing: border-box; 
        }

        .formula-text {
            font-size: 14px;
            color: #333333;
            margin-bottom: 20px;
        }

        /* Fake reCAPTCHA Styling */
        .fake-recaptcha {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fafafa;
            border: 1px solid #d3d3d3;
            border-radius: 3px;
            padding: 10px 15px;
            margin: 0 auto 20px auto;
            width: 80%;
            box-sizing: border-box;
        }

        .fake-recaptcha-left {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .fake-recaptcha-left input[type="checkbox"] {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            cursor: pointer;
        }

        .fake-recaptcha-left span {
            font-size: 14px;
            color: #555555;
        }

        .fake-recaptcha-right {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .fake-recaptcha-right .icon {
            font-size: 20px;
            color: #4a90e2;
            margin-bottom: 2px;
        }

        .fake-recaptcha-right .text {
            font-size: 10px;
            color: #999999;
        }

        button {
            background-color: #f57c00; 
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
            width: 80%;
            margin-bottom: 10px;
        }

        button:hover {
            background-color: #e66a00;
        }

        .result-section {
            margin-top: 20px;
        }

        .result-output {
            font-size: 18px;
            color: #666666;
            font-style: italic;
        }

        /* Dashboard Styling */
        .dashboard {
            width: 100%;
            max-width: 600px;
            background-color: #ffffff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }

        .dashboard h2 {
            font-size: 20px;
            margin-top: 0;
            border-bottom: 2px solid #f57c00;
            padding-bottom: 10px;
        }

        .agent-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .agent-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eeeeee;
            font-size: 16px;
        }

        .agent-item:last-child {
            border-bottom: none;
        }

        .agent-name {
            font-weight: bold;
        }

        .agent-stats {
            color: #555555;
        }

        .footer-note {
            margin-top: 20px;
            font-size: 12px;
            color: #888888;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        <img src="U.GS.U.C-logo.png" alt="Unofficial Geek Squad U.GS.U.C. Logo" class="logo">

        <h1>U.GS.U.C. - Utilization Goal</h1>

        <div class="input-group">
            <label for="agentSelect" class="input-label">Select Agent</label>
            <select id="agentSelect" autocomplete="off">
                <option value="" disabled selected>-- Choose Agent --</option>
                <option value="Alvan">Alvan</option>
                <option value="Alejandro">Alejandro</option>
                <option value="Justin">Justin</option>
                <option value="Josh">Josh</option>
                <option value="James">James</option>
                <option value="Marrion">Marrion</option>
                <option value="Rob">Rob</option>
                <option value="Diana">Diana</option>
                <option value="Kurt">Kurt</option>
                <option value="G">G</option>
                <option value="Arturo">Arturo</option>
            </select>
        </div>

        <div class="input-group">
            <label for="hoursWorked" class="input-label">Hours Worked</label>
            <input type="number" id="hoursWorked" placeholder="e.g., 8" autocomplete="off">
        </div>

        <p class="formula-text">Goal = (hours x 60) x 0.81</p>

        <div class="fake-recaptcha">
            <label class="fake-recaptcha-left" for="robotCheck">
                <input type="checkbox" id="robotCheck" autocomplete="off">
                <span>I'm not a robot</span>
            </label>
            <div class="fake-recaptcha-right">
                <div class="icon">↻</div>
                <div class="text">reCAPTCHA</div>
            </div>
        </div>

        <button id="calculateBtn">Calculate & Log Target</button>

        <div class="result-section">
            <p id="resultOutput" class="result-output">Awaiting calculation...</p>
        </div>
    </div>

    <div class="dashboard">
        <h2>Precinct Totals (Target Minutes)</h2>
        <ul class="agent-list" id="agentList">
            </ul>
    </div>

    <div class="footer-note">Target: 81% (0.81) | You can do it!!! | v0.2</div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const calculateBtn = document.getElementById('calculateBtn');
            const agentSelect = document.getElementById('agentSelect');
            const hoursInput = document.getElementById('hoursWorked');
            const robotCheck = document.getElementById('robotCheck');
            const resultOutput = document.getElementById('resultOutput');
            const agentListElement = document.getElementById('agentList');

            // Load saved data from localStorage, or start with an empty object if none exists
            let precinctData = JSON.parse(localStorage.getItem('ugds_precinct_data')) || {};

            // Force clear the inputs and checkbox on page load/refresh
            hoursInput.value = '';
            agentSelect.selectedIndex = 0;
            robotCheck.checked = false;
            
            // Render the dashboard immediately on load
            updateDashboard();

            function updateDashboard() {
                agentListElement.innerHTML = ''; // Clear current list

                // Sort agents alphabetically before displaying
                const sortedAgents = Object.keys(precinctData).sort();

                if (sortedAgents.length === 0) {
                    agentListElement.innerHTML = '<li class="agent-item" style="color:#999; justify-content:center;">No data logged yet.</li>';
                    return;
                }

                sortedAgents.forEach(agent => {
                    const totalMinutes = precinctData[agent];
                    const displayHours = Math.floor(totalMinutes / 60);
                    const displayMinutes = totalMinutes % 60;

                    const li = document.createElement('li');
                    li.className = 'agent-item';
                    
                    li.innerHTML = `
                        <span class="agent-name">${agent}</span>
                        <span class="agent-stats">${totalMinutes} min (~${displayHours}h ${displayMinutes}m)</span>
                    `;
                    agentListElement.appendChild(li);
                });
            }

            function calculateGoal() {
                const selectedAgent = agentSelect.value;
                const hoursVal = hoursInput.value;

                if (!selectedAgent) {
                    resultOutput.textContent = "Please select an agent first!";
                    resultOutput.style.color = "#d32f2f";
                    return;
                }

                if (!robotCheck.checked) {
                    resultOutput.textContent = "Security check: Please verify you are not a robot!";
                    resultOutput.style.color = "#d32f2f"; 
                    return;
                }

                if (hoursVal === "" || isNaN(hoursVal) || hoursVal < 0) {
                    resultOutput.textContent = "Please enter a valid number of hours.";
                    resultOutput.style.color = "#d32f2f";
                    return;
                }

                const hours = parseFloat(hoursVal);
                const targetMinutes = Math.round((hours * 60) * 0.81);

                // Add to the agent's running total in our data object
                if (!precinctData[selectedAgent]) {
                    precinctData[selectedAgent] = 0;
                }
                precinctData[selectedAgent] += targetMinutes;

                // Save the updated object back into the browser's localStorage
                localStorage.setItem('ugds_precinct_data', JSON.stringify(precinctData));

                // Show success message
                resultOutput.style.color = "#4CAF50"; // Green for success
                resultOutput.textContent = `Logged ${targetMinutes} target minutes for ${selectedAgent}.`;

                // Update the dashboard UI
                updateDashboard();
                
                // Uncheck robot to force it for the next entry
                robotCheck.checked = false;
                hoursInput.value = '';
            }

            calculateBtn.addEventListener('click', calculateGoal);

            hoursInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    calculateGoal();
                }
            });
        });
    </script>
</body>
</html>

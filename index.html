<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U.GS.U.C. - Utilization Goal Calculator</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .calculator-container {
            background-color: #ffffff;
            width: 90%;
            max-width: 600px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .logo {
            display: block;
            margin: 0 auto 30px;
            max-width: 250px;
            height: auto;
        }

        h1 {
            font-size: 24px;
            font-weight: bold;
            color: #000000;
            margin-bottom: 30px;
        }

        .input-group {
            width: 80%;
            margin: 0 auto 20px;
            text-align: left;
        }

        .input-label {
            display: block;
            font-size: 14px;
            color: #666666;
            margin-bottom: 5px;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            box-sizing: border-box; 
        }

        .formula-text {
            font-size: 14px;
            color: #333333;
            margin-bottom: 20px;
        }

        /* Fake reCAPTCHA Styling */
        .fake-recaptcha {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fafafa;
            border: 1px solid #d3d3d3;
            border-radius: 3px;
            padding: 10px 15px;
            margin: 0 auto 20px auto;
            width: 80%;
            box-sizing: border-box;
            box-shadow: 0px 2px 4px rgba(0,0,0,0.05);
        }

        .fake-recaptcha-left {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .fake-recaptcha-left input[type="checkbox"] {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            cursor: pointer;
        }

        .fake-recaptcha-left span {
            font-family: "Roboto", Arial, sans-serif;
            font-size: 14px;
            color: #555555;
        }

        .fake-recaptcha-right {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: "Roboto", Arial, sans-serif;
        }

        .fake-recaptcha-right .icon {
            font-size: 20px;
            line-height: 1;
            color: #4a90e2;
            margin-bottom: 2px;
        }

        .fake-recaptcha-right .text {
            font-size: 10px;
            color: #999999;
        }

        button {
            background-color: #f57c00; 
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #e66a00;
        }

        .result-section {
            margin-top: 30px;
        }

        .result-label {
            font-size: 16px;
            color: #333333;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .result-output {
            font-size: 18px;
            color: #666666;
            font-style: italic;
        }

        .footer-note {
            margin-top: 20px;
            font-size: 12px;
            color: #888888;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        <img src="U.GS.U.C-logo.png" alt="Unofficial Geek Squad U.GS.U.C. Logo" class="logo">

        <h1>U.GS.U.C. - Utilization Goal Calculator</h1>

        <div class="input-group">
            <label for="hoursWorked" class="input-label">Hours Worked</label>
            <input type="number" id="hoursWorked" placeholder="e.g., 8" autocomplete="off">
        </div>

        <p class="formula-text">Goal = (hours x 60) x 0.81</p>

        <div class="fake-recaptcha">
            <label class="fake-recaptcha-left" for="robotCheck">
                <input type="checkbox" id="robotCheck" autocomplete="off">
                <span>I'm not a robot</span>
            </label>
            <div class="fake-recaptcha-right">
                <div class="icon">↻</div>
                <div class="text">reCAPTCHA</div>
            </div>
        </div>

        <button id="calculateBtn">Calculate Goal</button>

        <div class="result-section">
            <p class="result-label">Result:</p>
            <p id="resultOutput" class="result-output">Goal for 8 hours: 389 minutes</p>
        </div>
    </div>

    <div class="footer-note">Target: 81% (0.81) | You can do it!!! | v0.1</div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const calculateBtn = document.getElementById('calculateBtn');
            const hoursInput = document.getElementById('hoursWorked');
            const robotCheck = document.getElementById('robotCheck');
            const resultOutput = document.getElementById('resultOutput');

            // Force clear the inputs and checkbox on page load/refresh
            hoursInput.value = '';
            robotCheck.checked = false;
            
            // Reset the text just in case the browser cached an old error state
            resultOutput.textContent = 'Goal for 8 hours: 389 minutes';
            resultOutput.style.color = '#666666';

            function calculateGoal() {
                if (!robotCheck.checked) {
                    resultOutput.textContent = "Security check: Please verify you are not a robot!";
                    resultOutput.style.color = "#d32f2f"; 
                    return;
                }

                const hoursVal = hoursInput.value;

                if (hoursVal === "" || isNaN(hoursVal) || hoursVal < 0) {
                    resultOutput.textContent = "Please enter a valid number of hours.";
                    resultOutput.style.color = "#d32f2f";
                    return;
                }

                const hours = parseFloat(hoursVal);
                const totalMinutes = (hours * 60) * 0.81;
                const roundedMinutes = Math.round(totalMinutes);

                resultOutput.style.color = "#666666"; 
                resultOutput.textContent = `Goal for ${hours} hours: ${roundedMinutes} minutes`;
            }

            calculateBtn.addEventListener('click', calculateGoal);

            hoursInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    calculateGoal();
                }
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U.GS.U.S. - Utilization System</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <img src="U.GS.U.S-logo.png" id="secretLogo" alt="U.GS.U.S. Logo" class="logo">
    <h1>U.GS.U.S. - Utilization System</h1>

    <div class="main-layout">
        
        <div class="calculator-container">
            <div class="input-group">
                <label for="agentSelect" class="input-label">Select Agent</label>
                <select id="agentSelect" autocomplete="off">
                    <option value="" disabled selected>-- Choose Agent --</option>
                    <option value="Alvan">Alvan</option>
                    <option value="Alejandro">Alejandro</option>
                    <option value="Justin">Justin</option>
                    <option value="Josh">Josh</option>
                    <option value="James">James</option>
                    <option value="Marrion">Marrion</option>
                    <option value="Rob">Rob</option>
                    <option value="Diana">Diana</option>
                    <option value="Kurt">Kurt</option>
                    <option value="G">G</option>
                    <option value="Arturo">Arturo</option>
                </select>
            </div>

            <div class="input-group">
                <label for="actionSelect" class="input-label">What are you doing?</label>
                <select id="actionSelect" autocomplete="off">
                    <option value="GOAL">1. Set Scheduled Target</option>
                    <option value="PROGRESS">2. Log Work Order</option>
                </select>
            </div>

            <div id="goalInputsWrapper">
                <div class="input-group">
                    <label for="hoursInput" class="input-label">Scheduled Hours</label>
                    <input type="text" inputmode="decimal" id="hoursInput" placeholder="e.g., 35.5">
                </div>
            </div>

            <div id="progressInputsWrapper" style="display: none;">
                <div class="wo-calc-container">
                    <div class="input-group" style="width: 100%;">
                        <label for="woInput" class="input-label">Last 4 of WO</label>
                        <input type="text" inputmode="numeric" id="woInput" placeholder="1234" maxlength="4">
                    </div>
                    <div class="wo-calc-row">
                        <select class="service-select"><option value="0">-- Tag 1 --</option><option value="57">GSDB (57m)</option><option value="49">GSOSR (49m)</option><option value="25">GSDI (25m)</option></select>
                        <select class="service-select"><option value="0">-- Tag 2 --</option><option value="57">GSDB (57m)</option><option value="49">GSOSR (49m)</option><option value="25">GSDI (25m)</option></select>
                    </div>
                </div>
            </div>

            <div class="fake-recaptcha">
                <input type="checkbox" id="robotCheck">
                <span>I'm not a robot</span>
            </div>

            <p id="lockWarning" class="lock-warning">Locked to current week.</p>
            <button id="submitBtn" class="primary-btn">Submit Data</button>
            <p id="resultOutput" class="result-output">Ready to sync...</p>
        </div>

        <div id="cheatsheetContainer" class="cheatsheet-container" style="display: none;">
            <h3>Service Grid</h3>
            <div class="cheatsheet-grid">
                <span>GSDB</span><span>57m</span>
                <span>GSOSR</span><span>49m</span>
                <span>GSDI</span><span>25m</span>
            </div>
        </div>
    </div>

    <div class="dashboard">
        <div class="dashboard-header">
            <h2>Precinct Totals</h2>
            <div class="week-controls">
                <button id="prevWeekBtn" class="nav-btn">❮</button>
                <span class="week-label" id="weekLabel">Loading...</span>
                <button id="nextWeekBtn" class="nav-btn">❯</button>
                <button id="currentWeekBtn" class="nav-btn">↺</button>
            </div>
        </div>
        <ul class="agent-list" id="agentList"></ul>
    </div>

    <div id="adminPanel" class="admin-panel" style="display: none;">
        <span class="close-admin-btn" id="closeAdminBtn">✖</span>
        <h3>🛡️ Admin Override</h3>
        <button id="resetDataBtn" class="admin-action-btn">Wipe Data</button>
    </div>

    <div id="passwordModal" class="modal-overlay">
        <div class="modal-content">
            <h3>ADMIN LOGIN</h3>
            <input type="password" id="secretCodeInput" placeholder="Password">
            <button id="authSubmitBtn" class="primary-btn">Enter</button>
            <button id="authCancelBtn" class="cancel-btn">Cancel</button>
        </div>
    </div>

    <div class="footer-note">v<span id="appVersionDisplay"></span> | joshwuff.com</div>

    <script src="script.js"></script>
</body>
</html>

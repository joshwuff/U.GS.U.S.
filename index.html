<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U.GS.U.C. - Utilization Goal Calculator</title>
    <style>
        /*
         * CSS Stylesheet
         * Replicates the colors, centering, and layout seen in image_14.png
         */
        body {
            /* Mimics the office background of the monitor */
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* The main white box containing the app */
        .calculator-container {
            background-color: #ffffff;
            width: 90%;
            max-width: 600px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        /* The complex composite logo from image_13.png */
        .logo {
            display: block;
            margin: 0 auto 30px;
            max-width: 250px;
            height: auto;
        }

        /* Main Title */
        h1 {
            font-size: 24px;
            font-weight: bold;
            color: #000000;
            margin-bottom: 30px;
        }

        /* Input section styling */
        .input-group {
            width: 80%;
            margin: 0 auto 20px;
            text-align: left;
        }

        .input-label {
            display: block;
            font-size: 14px;
            color: #666666;
            margin-bottom: 5px;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            box-sizing: border-box; /* Crucial for padding to work correctly */
        }

        /* Formula text styling */
        .formula-text {
            font-size: 14px;
            color: #333333;
            margin-bottom: 30px;
        }

        /* Primary action button (Orange) */
        button {
            background-color: #f57c00; /* Distinctive Orange from image_13.png */
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #e66a00;
        }

        /* Result section styling */
        .result-section {
            margin-top: 30px;
        }

        .result-label {
            font-size: 16px;
            color: #333333;
            margin-bottom: 10px;
            font-weight: bold;
        }

        /*
         * The Result Text.
         * Grey and italicized, exactly as in image_14.png.
         * This will update via JavaScript.
         */
        .result-output {
            font-size: 18px;
            color: #666666;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        <img src="https://i.imgur.com/Kj75lGj.png" alt="Unofficial Geek Squad U.GS.U.C. Logo" class="logo">

        <h1>U.GS.U.C. - Utilization Goal Calculator</h1>

        <div class="input-group">
            <label for="hoursWorked" class="input-label">Hours Worked</label>
            <input type="number" id="hoursWorked" placeholder="e.g., 8">
        </div>

        <p class="formula-text">Goal = (hours x 60) x 0.81</p>

        <button id="calculateBtn">Calculate Goal</button>

        <div class="result-section">
            <p class="result-label">Result:</p>
            <p id="resultOutput" class="result-output">Goal for 8 hours: 389 minutes</p>
        </div>
    </div>

    <script>
        /*
         * JavaScript Functionality
         * Handles user input, validation, and real-time calculation.
         */
        document.addEventListener('DOMContentLoaded', () => {
            const calculateBtn = document.getElementById('calculateBtn');
            const hoursInput = document.getElementById('hoursWorked');
            const resultOutput = document.getElementById('resultOutput');

            // Function to perform the calculation and update the output
            function calculateGoal() {
                const hoursVal = hoursInput.value;

                // Validation: check if the input is a valid number
                if (hoursVal === "" || isNaN(hoursVal) || hoursVal < 0) {
                    resultOutput.textContent = "Please enter a valid number of hours.";
                    resultOutput.style.color = "red";
                    return;
                }

                const hours = parseFloat(hoursVal);

                // Replicating the formula from image_11.png: (hours x 60) x 0.81
                const totalMinutes = (hours * 60) * 0.81;

                // Rounding to the nearest whole minute for a clean target.
                const roundedMinutes = Math.round(totalMinutes);

                // Formatting and updating the output text.
                // Ensures the output matches the "Goal for X hours: Y minutes" pattern.
                resultOutput.style.color = "#666666"; // Restore grey color
                resultOutput.textContent = `Goal for ${hours} hours: ${roundedMinutes} minutes`;
            }

            // Attaching the event listener to the button
            calculateBtn.addEventListener('click', calculateGoal);

            // Optional: Also allow calculation by pressing 'Enter' in the input box
            hoursInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    calculateGoal();
                }
            });
        });
    </script>
</body>
</html>
